type: action
definition:
  title: Call Cortex Responder
  description: Call Cortex Responder
  display_group: TheHive
  namespace: integrations.thehive
  name: call_responder
  secrets:
    - name: thehive4
      keys: ["apikey", "url"]
  expects:
    object_id:
      type: str 
      description: Case ID, Artifact ID...
    object_type:
      type: str 
      description: Case, Artifact
      default: case
    responder_id:
      type: str 
      description: Every responder has an id, run the responder manually and check in the networks
  steps:
    - ref: call_responder
      action: core.http_request
      args:
        url: ${{ SECRETS.thehive4.url }}/api/connector/cortex/action
        method: POST
        headers:
          Authorization: Bearer ${{ SECRETS.thehive4.apikey }}
          Content-Type: application/json
        payload:
          responderId: ${{ inputs.responder_id }}
          objectType: ${{ inputs.object_type }}
          objectId: ${{ inputs.object_id }}  
  returns: ${{ steps.call_responder.result }}
